feature:
  name: push
  product: cli

components:
  PUSH_ALL:
    name: The `acai push --all` command
    requirements:
      1: Scans codebase and pushes all discovered specs and code references (see SCAN)
      2: Accepts optional --states argument (see STATES)
      3: Exits with code `2` if both a `<feature-name>` and `--all` arguments are included together
      3-1: Instructs the user with a helpful message explaining that the command only supports one, not both.
      4: Exits with code `2` if the `--all` command is omitted and no `<feature-name>` argument was provided
      3-2: Instructs the user with a helpful message explaining that one or the other is required.

  PUSH_FEAT:
    name: The `acai push <feature-name> [feature-name...]` command
    requirements:
      1: Scans codebase and pushes only the specs and code references of the included `feature-name` arguments.

  STATES:
    name: The `--states '{ ... }'` JSON argument is used to apply `feature_impl_states`
    requirements:
      1: Accepts a JSON object of ACID keys and state objects
      2: Infers the target implementation

  PUSH:
    name: Push behavior
    requirements:
      1: A successful push exits with code `0`
      2: Any server error exits with code `1` and writes the error to stderr
      3: A `413 Too Large` response instructs the user to scope their push by providing a feature name
      4: The CLI does not chunk, retry, or split payloads

constraints:
  SCAN:
    name: Scan behavior
    requirements:
      1: The scan discovers all `*.feature.yaml` files in the codebase
      2: The scan discovers all occurrences of requirement IDs in source files
      3: Omit `node_modules`, `.git`, `dist`, `build`, and `vendor` from all scans

  AUTH:
    name: Authentication
    requirements:
      1: Every push request must include a Bearer token
      2: The token must be configurable via an environment variable
