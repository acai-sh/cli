feature:
    name: cli-core
    product: cli
    version: 1.0.0
    description: |
        Shared command-line behavior for the acai CLI.
        These requirements apply across the CLI surface where relevant.

components:
    TARGETING:
        description: Shared implementation resolution behavior for commands that target one implementation
        requirements:
            1: A command that accepts `--impl` uses that implementation directly when it is provided
            2: A command that omits `--impl` and supports branch-based targeting reads the current repo remote and branch name from git
            3: If branch-based targeting yields exactly one implementation, that implementation is used automatically
            4: If branch-based targeting yields multiple implementations, the command exits with an ambiguity error and lists the candidate names
            5: If branch-based targeting yields no implementations, the command exits non-zero and states that no implementation matched the current repo, branch, and product

    AUTH:
        description: Shared API authentication behavior
        requirements:
            1: A command that calls the API includes a Bearer token in each request
            2: The Bearer token is configurable via an environment variable

    CONFIG:
        description: Shared runtime configuration behavior
        requirements:
            1: A command that calls the API reads the API base URL from configuration
            2: A command that requires API configuration exits with a usage or input validation error when required configuration is missing

    OUTPUT:
        description: Shared machine-readable output behavior
        requirements:
            1: A command that supports `--json` reserves stdout for the final JSON payload when `--json` is active
            2: A command that supports `--json` writes warnings, diagnostics, and non-payload text to stderr when `--json` is active

    ERRORS:
        description: Shared API and runtime error reporting behavior
        requirements:
            1: When the API returns an error response with a detail message, the command surfaces that detail to the user
            2: When branch-based targeting cannot read the current repo remote or branch name from git, the command exits non-zero and states that git context could not be determined

constraints:
    HTTP:
        requirements:
            1: A network failure while calling the API exits with code `1`
            2: An API authentication or authorization failure exits with code `1`
            3: An API not found or validation failure exits with code `1`

    EXITS:
        requirements:
            1: A successful command exits with code `0`
            2: A usage or input validation error exits with code `2`
            3: A runtime failure exits with code `1`

    UX:
        requirements:
            1: The CLI works in non-interactive environments such as CI and agent runtimes
            2: The CLI never requires an interactive prompt to complete a command

    DIST:
        requirements:
            1: The CLI can be distributed as a JavaScript bundle runnable via `npx`
            2: The CLI can be distributed through GitHub Releases as platform-specific binaries
            3: GitHub Release binaries are built using `bun compile`
